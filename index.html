<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuclear Button</title>
  <!-- Telegram Mini App SDK — обязательно первым -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #e01020;
      --red-dark: #900a14;
      --red-glow: #ff2030;
      --red-light: #ff6070;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: 'Space Mono', monospace;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 120%, rgba(200, 10, 20, 0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 20% 20%, rgba(255, 20, 40, 0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grid lines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,20,30,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,20,30,0.05) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    /* Title */
    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 6vw, 4.5rem);
      letter-spacing: 0.12em;
      color: #fff;
      text-shadow:
        0 0 20px rgba(255, 40, 50, 0.6),
        0 0 60px rgba(255, 20, 30, 0.3);
      text-align: center;
      user-select: none;
    }

    .title span {
      color: var(--red-glow);
      text-shadow:
        0 0 10px var(--red-glow),
        0 0 30px var(--red-glow),
        0 0 80px rgba(255,30,50,0.5);
    }

    /* Counter */
    .counter-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .counter-label {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
    }

    .counter {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 7rem);
      line-height: 1;
      color: #fff;
      letter-spacing: 0.06em;
      text-shadow:
        0 0 10px rgba(255,255,255,0.2),
        0 0 30px rgba(255, 50, 60, 0.25);
      transition: transform 0.08s cubic-bezier(.36,.07,.19,.97),
                  text-shadow 0.08s ease;
      user-select: none;
    }

    .counter.pop {
      transform: scale(1.18);
      text-shadow:
        0 0 10px rgba(255,255,255,0.5),
        0 0 40px rgba(255,60,70,0.7);
    }

    /* ===== METAL TOGGLE SWITCH ===== */
    .tumbler-section {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Carbon panel — wider */
    .tumbler-panel {
      position: relative;
      width: 90px;
      height: 130px;
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
      background:
        repeating-linear-gradient(45deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 6px),
        repeating-linear-gradient(-45deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 6px),
        linear-gradient(160deg, #1e1e1e 0%, #121212 60%, #1a1a1a 100%);
      border: 1.5px solid #333;
      box-shadow:
        0 6px 30px rgba(0,0,0,0.85),
        inset 0 1px 0 rgba(255,255,255,0.05),
        inset 0 -1px 0 rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Panel corner screws */
    .tumbler-panel::before,
    .tumbler-panel::after {
      content: '';
      position: absolute;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #555, #2a2a2a);
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.9), 0 1px 0 rgba(255,255,255,0.08);
    }
    .tumbler-panel::before { top: 7px; left: 7px; }
    .tumbler-panel::after  { bottom: 7px; right: 7px; }

    /* Toggle mechanism container */
    .toggle-body {
      position: relative;
      width: 26px;
      height: 94px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Oval metal base mount */
    .toggle-base {
      position: absolute;
      bottom: 0;
      width: 28px;
      height: 38px;
      background: linear-gradient(160deg, #5a5a5a 0%, #3a3a3a 40%, #252525 100%);
      border-radius: 6px;
      border: 1px solid #555;
      box-shadow:
        0 4px 10px rgba(0,0,0,0.8),
        inset 0 1px 0 rgba(255,255,255,0.15),
        inset 0 -1px 3px rgba(0,0,0,0.5);
    }

    /* Subtle slot in the base */
    .toggle-base::after {
      content: '';
      position: absolute;
      bottom: 8px; left: 50%;
      transform: translateX(-50%);
      width: 10px; height: 14px;
      border-radius: 3px;
      background: #1a1a1a;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.9);
    }

    /* The metal lever stem — OFF = tilted LEFT */
    .toggle-stem {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%) rotate(-30deg);
      transform-origin: bottom center;
      width: 9px;
      height: 48px;
      background: linear-gradient(90deg, #888 0%, #d0d0d0 25%, #c0c0c0 55%, #707070 100%);
      border-radius: 4px 4px 3px 3px;
      box-shadow:
        2px 0 5px rgba(0,0,0,0.5),
        -1px 0 3px rgba(255,255,255,0.08);
      transition: transform 0.4s cubic-bezier(0.34, 1.4, 0.64, 1);
      z-index: 3;
    }

    /* Knurled texture on stem */
    .toggle-stem::before {
      content: '';
      position: absolute;
      top: 8px; left: 1px; right: 1px;
      height: 26px;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.2) 0px, rgba(0,0,0,0.2) 1px,
        rgba(255,255,255,0.08) 1px, rgba(255,255,255,0.08) 3px
      );
      border-radius: 3px;
    }

    /* Ball tip */
    .toggle-stem::after {
      content: '';
      position: absolute;
      top: -8px; left: 50%;
      transform: translateX(-50%);
      width: 15px; height: 15px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #e0e0e0, #999 50%, #555 100%);
      box-shadow:
        0 2px 8px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.4);
    }

    /* Armed — lever flips RIGHT (ON) */
    .tumbler-panel.armed .toggle-stem {
      transform: translateX(-50%) rotate(30deg);
    }

    /* Indicator row — two blocks side by side at top of panel */
    .indicator-row {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: flex-start;
      width: 100%;
      padding: 10px 14px 0;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 4;
    }

    .indicator-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .ind-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .ind-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.52rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    /* OFF block — yellow when unarmed */
    #ind-off .ind-dot {
      background: rgba(255, 200, 50, 0.9);
      box-shadow: 0 0 6px rgba(255,200,0,0.8), 0 0 12px rgba(255,180,0,0.3);
    }
    #ind-off .ind-label {
      color: rgba(255, 200, 50, 0.85);
      text-shadow: 0 0 6px rgba(255,190,0,0.4);
    }

    /* ON block — dim when unarmed */
    #ind-on .ind-dot {
      background: #1a0000;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.9);
    }
    #ind-on .ind-label {
      color: rgba(255,255,255,0.2);
    }

    /* ARMED: OFF dims, ON lights red */
    .tumbler-panel.armed #ind-off .ind-dot {
      background: #1a1000;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.9);
    }
    .tumbler-panel.armed #ind-off .ind-label {
      color: rgba(255,255,255,0.2);
      text-shadow: none;
    }
    .tumbler-panel.armed #ind-on .ind-dot {
      background: #ff2020;
      box-shadow: 0 0 7px rgba(255,30,30,0.95), 0 0 16px rgba(255,0,0,0.5);
    }
    .tumbler-panel.armed #ind-on .ind-label {
      color: rgba(255, 60, 60, 0.95);
      text-shadow: 0 0 8px rgba(255,40,40,0.5);
    }

    /* Hide old label/LED elements */
    .toggle-label-on, .toggle-label-off, .toggle-led { display: none; }

    /* ===== BUTTON SQUARE PLATE ===== */
    .btn-plate {
      position: relative;
      width: clamp(220px, 40vw, 340px);
      height: clamp(220px, 40vw, 340px);
      background: linear-gradient(145deg, #181818 0%, #0e0e0e 50%, #161616 100%);
      border-radius: 28px;
      border: 1.5px solid #2e2e2e;
      box-shadow:
        0 8px 40px rgba(0,0,0,0.9),
        inset 0 1px 0 rgba(255,255,255,0.04),
        inset 0 -2px 8px rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Plate corner bolts */
    .plate-bolt {
      position: absolute;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #606060, #303030 60%, #1a1a1a);
      border: 1px solid #444;
      box-shadow:
        inset 0 1px 3px rgba(0,0,0,0.9),
        inset 0 -1px 1px rgba(255,255,255,0.05),
        0 1px 2px rgba(255,255,255,0.06);
    }
    /* Bolt cross-slot */
    .plate-bolt::before,
    .plate-bolt::after {
      content: '';
      position: absolute;
      background: rgba(0,0,0,0.6);
      border-radius: 1px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .plate-bolt::before { width: 6px; height: 1.5px; }
    .plate-bolt::after  { width: 1.5px; height: 6px; }

    .plate-bolt-nw { top: 12px;  left: 12px; }
    .plate-bolt-ne { top: 12px;  right: 12px; }
    .plate-bolt-sw { bottom: 12px; left: 12px; }
    .plate-bolt-se { bottom: 12px; right: 12px; }

    /* ===== BUTTON ===== */
    .btn-outer {
      position: relative;
      width: clamp(150px, 26vw, 230px);
      height: clamp(150px, 26vw, 230px);
      border-radius: 50%;
      cursor: pointer;
      user-select: none;
      box-shadow:
        0 0 0 2px rgba(255,50,60,0.2),
        0 0 0 8px rgba(255,30,40,0.08),
        0 0 60px 10px rgba(200,10,20,0.35),
        0 0 120px 20px rgba(180,0,10,0.15);
      transition: box-shadow 0.15s ease, transform 0.1s ease;
    }

    .btn-outer:hover {
      box-shadow:
        0 0 0 2px rgba(255,80,90,0.35),
        0 0 0 12px rgba(255,40,50,0.12),
        0 0 80px 16px rgba(220,20,30,0.5),
        0 0 150px 30px rgba(200,10,20,0.2);
      transform: scale(1.03);
    }

    .btn-outer:active,
    .btn-outer.pressed {
      transform: scale(0.91) translateY(6px);
      box-shadow:
        0 0 0 2px rgba(255,100,110,0.4),
        0 0 25px 6px rgba(220,30,40,0.55),
        0 0 60px 12px rgba(200,10,20,0.25);
      transition: box-shadow 0.07s ease, transform 0.07s cubic-bezier(0.2,0.8,0.4,1);
    }

    /* ===== LOCKED BUTTON STATE ===== */
    .btn-outer.locked {
      cursor: not-allowed;
      filter: grayscale(0.7) brightness(0.42);
      pointer-events: none;
    }
    .btn-outer.locked .btn-body::after {
      content: '🔒';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2rem, 5vw, 3rem);
      border-radius: 50%;
      box-shadow: none;
      background: transparent;
    }

    @keyframes unlock-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(255,200,0,0.8); }
      50%  { box-shadow: 0 0 40px 20px rgba(255,180,0,0.4); }
      100% { box-shadow: 0 0 0 2px rgba(255,50,60,0.2), 0 0 0 8px rgba(255,30,40,0.08), 0 0 60px 10px rgba(200,10,20,0.35), 0 0 120px 20px rgba(180,0,10,0.15); }
    }
    .btn-outer.unlocking {
      animation: unlock-pulse 0.4s ease-out forwards;
    }

    /* Base red body */
    .btn-body {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%,
        #ff4550 0%,
        var(--red) 35%,
        var(--red-dark) 65%,
        #500008 100%
      );
      position: relative;
      overflow: hidden;
      transition: background 0.07s ease, box-shadow 0.07s ease;
    }

    .btn-outer.pressed .btn-body {
      background: radial-gradient(circle at 45% 45%,
        #cc1020 0%,
        #8a0810 40%,
        #500008 80%,
        #2a0004 100%
      );
      box-shadow: inset 0 6px 20px rgba(0,0,0,0.5);
    }

    /* Glass top shine */
    .btn-body::before {
      content: '';
      position: absolute;
      top: 6%;
      left: 12%;
      width: 70%;
      height: 42%;
      border-radius: 50%;
      background: linear-gradient(
        160deg,
        rgba(255,255,255,0.55) 0%,
        rgba(255,255,255,0.18) 40%,
        rgba(255,255,255,0.0) 100%
      );
      filter: blur(2px);
      pointer-events: none;
      transition: opacity 0.07s ease;
    }

    .btn-outer.pressed .btn-body::before {
      opacity: 0.4;
    }

    /* Glass rim inner shadow */
    .btn-body::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      box-shadow: inset 0 -8px 30px rgba(0,0,0,0.45),
                  inset 0 4px 10px rgba(255,180,180,0.15);
      pointer-events: none;
    }

    /* Small bottom glint */
    .btn-glint {
      position: absolute;
      bottom: 14%;
      left: 50%;
      transform: translateX(-50%);
      width: 30%;
      height: 10%;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(255,120,130,0.35) 0%, transparent 80%);
      pointer-events: none;
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: float-up 1.2s ease-out forwards;
    }

    @keyframes float-up {
      0%   { transform: translateY(0) scale(1); opacity: 0.9; }
      100% { transform: translateY(-120px) scale(0); opacity: 0; }
    }

    /* Scanline overlay */
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 99;
    }

    /* Glitch canvas */
    #glitch-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* Glitch horizontal tear */
    .glitch-tear {
      position: fixed;
      left: 0; right: 0;
      pointer-events: none;
      z-index: 98;
      opacity: 0;
      transition: opacity 0.05s;
    }

    /* Nuclear explosion canvas — behind everything */
    #nuke-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
      opacity: 0;
      transition: opacity 0.1s;
    }

    /* Flash overlay — also behind UI */
    #nuke-flash {
      position: fixed;
      inset: 0;
      background: #fff;
      pointer-events: none;
      z-index: -1;
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <canvas id="glitch-canvas"></canvas>
  <canvas id="nuke-canvas"></canvas>
  <div id="nuke-flash"></div>
  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="title">FLIP TO ARM FOR <span>10 ★</span></div>

    <!-- METAL TOGGLE SWITCH -->
    <div class="tumbler-section">
      <div class="tumbler-panel" id="tumbler">

        <!-- Indicator row: dot + label, side by side -->
        <div class="indicator-row">
          <div class="indicator-block" id="ind-off">
            <div class="ind-dot"></div>
            <span class="ind-label">OFF</span>
          </div>
          <div class="indicator-block" id="ind-on">
            <div class="ind-dot"></div>
            <span class="ind-label">ON</span>
          </div>
        </div>

        <!-- Toggle switch mechanism -->
        <div class="toggle-body">
          <div class="toggle-stem" id="toggle-stem"></div>
          <div class="toggle-base"></div>
        </div>

      </div>
    </div>

    <div class="counter-wrap">
      <div class="counter-label">times pressed</div>
      <div class="counter" id="counter">0</div>
    </div>

    <!-- Square plate with bolts -->
    <div class="btn-plate">
      <div class="plate-bolt plate-bolt-nw"></div>
      <div class="plate-bolt plate-bolt-ne"></div>
      <div class="plate-bolt plate-bolt-sw"></div>
      <div class="plate-bolt plate-bolt-se"></div>
      <div class="btn-outer locked" id="btn" role="button" aria-label="Push the button">
        <div class="btn-body">
          <div class="btn-glint"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== BACKEND URL — заменить после деплоя на Railway =====
    const BACKEND_URL = 'https://nuclear-button-production.up.railway.app';

    // ===== TELEGRAM MINI APP INIT =====
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand(); // раскрыть на весь экран
    }

    const btn = document.getElementById('btn');
    const counterEl = document.getElementById('counter');
    const particlesContainer = document.getElementById('particles');
    const tumbler = document.getElementById('tumbler');
    let count = 0;
    let armed = false;
    let paymentPending = false;

    // ===== TUMBLER — запускает оплату =====
    tumbler.addEventListener('click', async () => {
      if (armed || paymentPending) return;

      // Получаем user_id из Telegram SDK
      const userId = tg?.initDataUnsafe?.user?.id || 'test_user';

      paymentPending = true;

      try {
        // 1. Запрашиваем invoice link у нашего бэкенда
        const res = await fetch(`${BACKEND_URL}/create-invoice`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: userId }),
        });
        const data = await res.json();

        if (!data.ok) throw new Error(data.error);

        // 2. Открываем нативное окно оплаты Telegram
        tg.openInvoice(data.invoice_link, (status) => {
          paymentPending = false;

          if (status === 'paid') {
            // ✅ Оплата прошла — армируем кнопку
            armed = true;
            tumbler.classList.add('armed');
            btn.classList.remove('locked');
            btn.classList.add('unlocking');
            setTimeout(() => btn.classList.remove('unlocking'), 400);
          } else if (status === 'cancelled') {
            // Пользователь закрыл окно оплаты
            console.log('Payment cancelled');
          } else if (status === 'failed') {
            console.log('Payment failed');
          }
        });

      } catch (err) {
        paymentPending = false;
        console.error('Invoice error:', err);
        // Fallback для тестирования без Telegram (в браузере)
        if (!tg) {
          armed = true;
          tumbler.classList.add('armed');
          btn.classList.remove('locked');
          btn.classList.add('unlocking');
          setTimeout(() => btn.classList.remove('unlocking'), 400);
        }
      }
    });

    // ===== BUTTON =====
    btn.addEventListener('pointerdown', () => {
      if (!armed) return;
      btn.classList.add('pressed');
    });

    document.addEventListener('pointerup', () => {
      btn.classList.remove('pressed');
    });

    btn.addEventListener('click', () => {
      if (!armed) return;

      count++;
      counterEl.textContent = count;

      // Re-lock
      armed = false;
      btn.classList.add('locked');
      tumbler.classList.remove('armed');

      // Pop counter
      counterEl.classList.remove('pop');
      void counterEl.offsetWidth;
      counterEl.classList.add('pop');
      setTimeout(() => counterEl.classList.remove('pop'), 120);

      // Particles
      const rect = btn.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      for (let i = 0; i < 10; i++) spawnParticle(cx, cy);

      // Nuclear explosion on every press
      triggerNuke();
    });

    function spawnParticle(cx, cy) {
      const p = document.createElement('div');
      p.classList.add('particle');
      const size = 4 + Math.random() * 7;
      const angle = Math.random() * 360;
      const dist  = 30 + Math.random() * 80;
      const dx = Math.cos(angle * Math.PI / 180) * dist;
      const dy = Math.sin(angle * Math.PI / 180) * dist;
      const colors = ['#ff2030','#ff5060','#ff8090','#ffaaaa','#ff3040'];
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${cx + dx - size/2}px; top:${cy + dy - size/2}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        box-shadow: 0 0 6px ${colors[0]};
        animation-duration: ${0.8 + Math.random()*0.5}s;
      `;
      particlesContainer.appendChild(p);
      setTimeout(() => p.remove(), 1400);
    }

    // ===== NUCLEAR EXPLOSION =====
    const nukeCanvas = document.getElementById('nuke-canvas');
    const nCtx = nukeCanvas.getContext('2d');
    const nukeFlash = document.getElementById('nuke-flash');

    let nukeActive = false;
    let nukes = [];
    const ROCKET_DUR  = 1600;
    const EXPLODE_DUR = 6000;

    // Noise seed for bumpy smoke clouds
    function noise(x, y, seed) {
      const n = Math.sin(x * 127.1 + y * 311.7 + seed * 74.3) * 43758.5453;
      return n - Math.floor(n);
    }

    function resize() {
      nukeCanvas.width  = window.innerWidth;
      nukeCanvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function triggerNuke() {
      const count = 2 + Math.floor(Math.random() * 4); // 2–5 rockets
      nukes = [];
      const now = performance.now();
      for (let i = 0; i < count; i++) {
        const impactX = nukeCanvas.width * (0.1 + Math.random() * 0.8);
        nukes.push({
          phase: 'rocket',
          start: now + i * (200 + Math.random() * 400), // staggered launches
          impactX,
          rocketX: impactX + (Math.random() - 0.5) * 80,
          explodeStart: 0,
          done: false,
        });
      }
      nukeActive = true;
      nukeCanvas.style.opacity = '1';

      // Flash
      nukeFlash.style.transition = 'none';
      nukeFlash.style.opacity = '0.9';
      setTimeout(() => { nukeFlash.style.transition = 'opacity 1.5s ease-out'; nukeFlash.style.opacity = '0'; }, 80);
    }

    // ---- helpers ----
    function easeOut(t, p=2) { return 1 - Math.pow(1-t, p); }
    function easeIn(t, p=2)  { return Math.pow(t, p); }
    function clamp(v,a,b)    { return Math.max(a, Math.min(b, v)); }
    function lerp(a,b,t)     { return a + (b-a)*t; }

    // Draw one puffy smoke lobe
    function smokeLobe(ctx, x, y, r, alpha, hot) {
      const g = ctx.createRadialGradient(x, y-r*0.15, r*0.05, x, y, r);
      if (hot) {
        g.addColorStop(0,   `rgba(255,230,120,${alpha})`);
        g.addColorStop(0.3, `rgba(240,110,20,${alpha*0.95})`);
        g.addColorStop(0.65,`rgba(160,55,10,${alpha*0.8})`);
        g.addColorStop(1,   `rgba(80,20,5,0)`);
      } else {
        g.addColorStop(0,   `rgba(200,160,100,${alpha*0.9})`);
        g.addColorStop(0.4, `rgba(150,100,60,${alpha*0.75})`);
        g.addColorStop(0.75,`rgba(90,55,30,${alpha*0.5})`);
        g.addColorStop(1,   `rgba(40,20,5,0)`);
      }
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.fillStyle = g;
      ctx.fill();
    }

    // Draw rocket
    function drawRocket(ctx, x, y, size) {
      ctx.save();
      ctx.translate(x, y);
      const bg = ctx.createLinearGradient(-size*0.15, -size, size*0.15, size*0.3);
      bg.addColorStop(0, '#ccc'); bg.addColorStop(0.5, '#888'); bg.addColorStop(1, '#555');
      ctx.beginPath();
      ctx.roundRect(-size*0.12, -size*0.6, size*0.24, size*0.9, size*0.05);
      ctx.fillStyle = bg; ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-size*0.12, -size*0.6); ctx.lineTo(0, -size); ctx.lineTo(size*0.12, -size*0.6);
      ctx.closePath(); ctx.fillStyle = '#aaa'; ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-size*0.12, size*0.25); ctx.lineTo(-size*0.32, size*0.55); ctx.lineTo(-size*0.12, size*0.3);
      ctx.closePath(); ctx.fillStyle = '#777'; ctx.fill();
      ctx.beginPath();
      ctx.moveTo(size*0.12, size*0.25); ctx.lineTo(size*0.32, size*0.55); ctx.lineTo(size*0.12, size*0.3);
      ctx.closePath(); ctx.fillStyle = '#777'; ctx.fill();
      const flen = size * 0.5;
      const fg = ctx.createLinearGradient(0, size*0.3, 0, size*0.3+flen);
      fg.addColorStop(0, 'rgba(255,255,200,0.95)'); fg.addColorStop(0.3,'rgba(255,160,20,0.85)');
      fg.addColorStop(0.7,'rgba(255,60,0,0.5)');    fg.addColorStop(1,  'rgba(200,0,0,0)');
      ctx.beginPath();
      ctx.moveTo(-size*0.1, size*0.3);
      ctx.quadraticCurveTo(size*0.18, size*0.3+flen*0.5, 0, size*0.3+flen);
      ctx.quadraticCurveTo(-size*0.18, size*0.3+flen*0.5, size*0.1, size*0.3);
      ctx.fillStyle = fg; ctx.fill();
      ctx.restore();
    }

    // Draw one explosion at given impactX
    function drawOneExplosion(now, nuke) {
      const W = nukeCanvas.width, H = nukeCanvas.height;
      const cx = nuke.impactX;
      const groundY = H * 1.08;
      const elapsed = now - nuke.explodeStart;
      const T = clamp(elapsed / EXPLODE_DUR, 0, 1);
      const scale = 0.55 + Math.random() * 0.0; // slight size variation baked at spawn

      const tShock = clamp(T / 0.12, 0, 1);
      const tBall  = clamp(T / 0.3, 0, 1);
      const tStem  = clamp((T-0.08) / 0.45, 0, 1);
      const tCap   = clamp((T-0.18) / 0.5, 0, 1);
      const tFade  = clamp((T-0.72) / 0.28, 0, 1);
      const globalAlpha = 1 - easeIn(tFade, 1.8);

      // Sky tint — much stronger
      const skyA = Math.sin(T * Math.PI) * 0.55 * globalAlpha;
      const skyG = nCtx.createRadialGradient(cx, groundY, 0, cx, groundY*0.1, W*1.2);
      skyG.addColorStop(0, `rgba(255,150,20,${skyA})`);
      skyG.addColorStop(0.5, `rgba(200,60,0,${skyA*0.6})`);
      skyG.addColorStop(1, `rgba(80,10,0,0)`);
      nCtx.fillStyle = skyG; nCtx.fillRect(0,0,W,H);

      // Shockwave — full screen width
      if (tShock < 1) {
        const r = easeOut(tShock,2) * W * 1.1 * nuke.sizeScale;
        const a = (1-tShock) * 0.6 * globalAlpha;
        const sg = nCtx.createRadialGradient(cx, groundY, r*0.88, cx, groundY, r);
        sg.addColorStop(0, `rgba(255,240,140,${a})`);
        sg.addColorStop(0.5,`rgba(255,120,20,${a*0.5})`);
        sg.addColorStop(1,  `rgba(255,50,0,0)`);
        nCtx.beginPath(); nCtx.arc(cx, groundY, r, 0, Math.PI*2);
        nCtx.fillStyle = sg; nCtx.fill();
        nCtx.beginPath(); nCtx.arc(cx, groundY, r, 0, Math.PI*2);
        nCtx.strokeStyle = `rgba(255,220,100,${(1-tShock)*0.4})`;
        nCtx.lineWidth = 4; nCtx.stroke();
      }

      // Fireball — massive
      if (tBall > 0) {
        const bp = easeOut(tBall, 2.2);
        const ballR = (0.06 + bp*0.45) * W * nuke.sizeScale;
        const ballY = groundY - bp * H * 0.52;
        const ballA = (tBall < 0.6 ? 1 : 1-(tBall-0.6)/0.4) * globalAlpha;
        // wide outer glow
        const og = nCtx.createRadialGradient(cx, ballY, ballR*0.3, cx, ballY, ballR*2.2);
        og.addColorStop(0, `rgba(255,200,60,${ballA*0.5})`); og.addColorStop(1, `rgba(255,60,0,0)`);
        nCtx.beginPath(); nCtx.arc(cx, ballY, ballR*2.2, 0, Math.PI*2); nCtx.fillStyle = og; nCtx.fill();
        const seed = elapsed * 0.001;
        for (let i=0; i<18; i++) {
          const ang = (i/18)*Math.PI*2 + seed*0.3;
          const dist = ballR*(0.3 + noise(i,0,Math.floor(seed))*0.6);
          smokeLobe(nCtx, cx+Math.cos(ang)*dist, ballY+Math.sin(ang)*dist*0.85,
            ballR*(0.4+noise(i,1,Math.floor(seed))*0.4), ballA*(0.75+noise(i,2,0)*0.25), dist<ballR*0.55 || tBall<0.25);
        }
        const cg = nCtx.createRadialGradient(cx-ballR*0.1, ballY-ballR*0.2, 0, cx, ballY, ballR*0.65);
        cg.addColorStop(0,`rgba(255,255,255,${ballA})`); cg.addColorStop(0.25,`rgba(255,255,180,${ballA*0.9})`);
        cg.addColorStop(0.6,`rgba(255,160,30,${ballA*0.5})`); cg.addColorStop(1,`rgba(255,80,0,0)`);
        nCtx.beginPath(); nCtx.arc(cx, ballY, ballR*0.65, 0, Math.PI*2); nCtx.fillStyle = cg; nCtx.fill();
      }

      // Stem — taller, fills screen height
      if (tStem > 0) {
        const sp = easeOut(tStem, 1.6);
        const stemH = sp * H * 0.9 * nuke.sizeScale;
        const stemTopY = groundY - stemH;
        const stemA = clamp(tStem*3,0,1) * (1-easeIn(tFade,1.5)) * globalAlpha;
        const bW = W * 0.13 * nuke.sizeScale, tW = W * 0.045 * nuke.sizeScale;
        nCtx.save();
        nCtx.beginPath();
        nCtx.moveTo(cx-bW*0.5, groundY);
        nCtx.bezierCurveTo(cx-bW*0.4-W*0.02, groundY-stemH*0.25, cx-tW*0.5-W*0.012, groundY-stemH*0.7, cx-tW*0.5, stemTopY);
        nCtx.lineTo(cx+tW*0.5, stemTopY);
        nCtx.bezierCurveTo(cx+tW*0.5+W*0.012, groundY-stemH*0.7, cx+bW*0.4+W*0.02, groundY-stemH*0.25, cx+bW*0.5, groundY);
        nCtx.closePath();
        const stemG = nCtx.createLinearGradient(cx-bW, stemTopY, cx+bW, groundY);
        stemG.addColorStop(0,`rgba(90,55,30,${stemA*0.6})`); stemG.addColorStop(0.25,`rgba(180,100,45,${stemA*0.9})`);
        stemG.addColorStop(0.5,`rgba(220,130,55,${stemA})`); stemG.addColorStop(1,`rgba(70,40,18,${stemA*0.5})`);
        nCtx.fillStyle = stemG; nCtx.fill(); nCtx.restore();
      }

      // Mushroom cap — very wide
      if (tCap > 0) {
        const cp = easeOut(tCap, 2.5);
        const stemH = easeOut(tStem,1.6)*H*0.9*nuke.sizeScale;
        const capCY = groundY - stemH*0.92;
        const capRX = cp * W * 0.58 * nuke.sizeScale;
        const capRY = cp * W * 0.30 * nuke.sizeScale;
        const capA = clamp(tCap*2,0,1) * (1-easeIn(tFade,1.5)) * globalAlpha;
        const seed2 = elapsed*0.0008;
        const ug = nCtx.createRadialGradient(cx, capCY+capRY*0.4, 0, cx, capCY+capRY*0.2, capRX*0.9);
        ug.addColorStop(0,`rgba(25,10,3,${capA*0.9})`); ug.addColorStop(0.5,`rgba(60,30,10,${capA*0.7})`); ug.addColorStop(1,`rgba(30,12,3,0)`);
        nCtx.beginPath(); nCtx.ellipse(cx, capCY+capRY*0.5, capRX*0.85, capRY*0.6, 0, 0, Math.PI*2); nCtx.fillStyle=ug; nCtx.fill();
        const lobeRings = [
          {n:6,rFrac:0.88,yOff:-0.05,rSize:0.26,hot:false},{n:8,rFrac:0.70,yOff:-0.25,rSize:0.22,hot:false},
          {n:6,rFrac:0.50,yOff:-0.42,rSize:0.20,hot:true},{n:4,rFrac:0.28,yOff:-0.55,rSize:0.18,hot:true},
          {n:1,rFrac:0,yOff:-0.68,rSize:0.22,hot:true},
        ];
        for (const ring of lobeRings) {
          for (let i=0; i<ring.n; i++) {
            const ang = ring.n>1?(i/ring.n)*Math.PI*2+seed2*(ring.hot?0.4:0.15):0;
            const lx = cx+(ring.n>1?Math.cos(ang)*capRX*ring.rFrac:0);
            const ly = capCY+capRY*ring.yOff+(ring.n>1?Math.sin(ang)*capRY*0.45:0);
            smokeLobe(nCtx,lx,ly,capRX*ring.rSize*(0.85+noise(i,ring.n,Math.floor(seed2))*0.3),capA*(0.8+noise(i,0,1)*0.2),ring.hot);
          }
        }
        const tg2 = nCtx.createRadialGradient(cx,capCY-capRY*0.3,0,cx,capCY-capRY*0.1,capRX*0.55);
        tg2.addColorStop(0,`rgba(255,255,200,${capA*0.75})`); tg2.addColorStop(0.3,`rgba(255,200,60,${capA*0.6})`);
        tg2.addColorStop(0.7,`rgba(255,100,10,${capA*0.25})`); tg2.addColorStop(1,`rgba(200,40,0,0)`);
        nCtx.beginPath(); nCtx.ellipse(cx,capCY-capRY*0.15,capRX*0.55,capRY*0.75,0,0,Math.PI*2); nCtx.fillStyle=tg2; nCtx.fill();
      }

      // Ground dust
      if (T < 0.5) {
        const dp = easeOut(clamp(T/0.2,0,1),1.5);
        const dustR = dp * W * 0.45 * nuke.sizeScale;
        const dustA = (1-easeIn(clamp((T-0.08)/0.42,0,1),1.5))*0.5*globalAlpha;
        const dg2 = nCtx.createRadialGradient(cx,groundY,dustR*0.6,cx,groundY,dustR);
        dg2.addColorStop(0,`rgba(220,160,70,${dustA})`); dg2.addColorStop(0.5,`rgba(160,90,35,${dustA*0.7})`); dg2.addColorStop(1,`rgba(80,40,10,0)`);
        nCtx.beginPath(); nCtx.ellipse(cx,groundY,dustR,dustR*0.14,0,0,Math.PI*2); nCtx.fillStyle=dg2; nCtx.fill();
      }

      if (T >= 1) nuke.done = true;
    }

    // === MAIN DRAW ===
    function drawNuke(now) {
      if (!nukeActive) return;
      const W = nukeCanvas.width, H = nukeCanvas.height;
      const groundY = H * 1.08;
      nCtx.clearRect(0, 0, W, H);

      let anyActive = false;

      for (const nuke of nukes) {
        if (nuke.done) continue;
        if (now < nuke.start) { anyActive = true; continue; } // not launched yet

        anyActive = true;

        if (nuke.phase === 'rocket') {
          const elapsed = now - nuke.start;
          const t = clamp(elapsed / ROCKET_DUR, 0, 1);
          const et = easeIn(t, 1.5);
          const ry = lerp(-80, groundY - 10, et);
          const rx = lerp(nuke.rocketX, nuke.impactX, et);
          // trail
          for (let i=0; i<5; i++) {
            const tt = clamp(t - i*0.04, 0, 1);
            const ty = lerp(-80, groundY-10, easeIn(tt,1.5)) + i*12;
            const tx = lerp(nuke.rocketX, nuke.impactX, tt);
            smokeLobe(nCtx, tx+(Math.random()-0.5)*3, ty+i*7, 4+i*2.5, 0.1-i*0.015, false);
          }
          drawRocket(nCtx, rx, ry, 20);

          if (t >= 1) {
            nuke.phase = 'explode';
            nuke.explodeStart = now;
            // per-nuke size variation
            nuke.sizeScale = 0.85 + Math.random() * 0.55;
            // flash per rocket
            nukeFlash.style.transition = 'none';
            nukeFlash.style.opacity = `${0.7 + Math.random()*0.3}`;
            setTimeout(()=>{ nukeFlash.style.transition='opacity 1.2s ease-out'; nukeFlash.style.opacity='0'; }, 80);
          }
        } else {
          drawOneExplosion(now, nuke);
        }
      }

      if (!anyActive) {
        nukeActive = false;
        nukes = [];
        nukeCanvas.style.opacity = '0';
        nCtx.clearRect(0, 0, W, H);
      }
    }

    // ===== GLITCH EFFECT =====
    const canvas = document.getElementById('glitch-canvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function drawGlitch() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const now = Date.now();
      // Slow drift: trigger a glitch burst every 2.5–5s
      const burstInterval = 3000;
      const phase = (now % burstInterval) / burstInterval;

      // Only draw during short glitch windows (~8% of the cycle)
      if (phase > 0.08) return;

      const intensity = 1 - phase / 0.08; // fade out within window

      const numSlices = 3 + Math.floor(Math.random() * 5);
      for (let i = 0; i < numSlices; i++) {
        const y      = Math.random() * canvas.height;
        const h      = 1 + Math.random() * 6;
        const offset = (Math.random() - 0.5) * 40 * intensity;

        // Red channel shift
        ctx.save();
        ctx.globalAlpha = 0.18 * intensity;
        ctx.fillStyle = `rgba(255, 20, 30, 1)`;
        ctx.fillRect(offset, y, canvas.width, h);
        ctx.restore();

        // Cyan channel shift
        ctx.save();
        ctx.globalAlpha = 0.12 * intensity;
        ctx.fillStyle = `rgba(0, 210, 255, 1)`;
        ctx.fillRect(-offset * 0.6, y + h * 0.5, canvas.width, h * 0.7);
        ctx.restore();
      }

      // Occasional bright full-width flash bar
      if (Math.random() < 0.3) {
        const fy = Math.random() * canvas.height;
        ctx.save();
        ctx.globalAlpha = 0.06 * intensity;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, fy, canvas.width, 1 + Math.random() * 3);
        ctx.restore();
      }

      // Random noise blocks
      if (Math.random() < 0.4) {
        const bx = Math.random() * canvas.width;
        const by = Math.random() * canvas.height;
        const bw = 20 + Math.random() * 120;
        const bh = 2 + Math.random() * 8;
        ctx.save();
        ctx.globalAlpha = 0.07 * intensity;
        ctx.fillStyle = Math.random() > 0.5 ? '#ff2030' : '#00d4ff';
        ctx.fillRect(bx, by, bw, bh);
        ctx.restore();
      }
    }

    function glitchLoop(now) {
      drawGlitch();
      if (nukeActive) drawNuke(now);
      requestAnimationFrame(glitchLoop);
    }
    glitchLoop(performance.now());
  </script>
</body>
</html>
